<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pari &amp; Marshall — Celebration Weekend</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════
   RESET & VARIABLES
   ════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lavender:#B497D6;
  --deep-purple:#6A3D9A;
  --sage:#7A8B6F;
  --offwhite:#FAF9F6;
  --charcoal:#2D2D2D;
  --light-lavender:#E8D8F5;
  --card-shadow:0 2px 12px rgba(106,61,154,.12);
}
html{scroll-behavior:smooth}
body{
  font-family:'Lato',sans-serif;
  background:var(--offwhite);
  color:var(--charcoal);
  line-height:1.6;
  min-height:100vh;
}

/* ════════════════════════════════
   LOADING & FALLBACK
   ════════════════════════════════ */
.loader{text-align:center;padding:3rem 1rem}
.loader .spin{
  display:inline-block;width:30px;height:30px;
  border:3px solid var(--light-lavender);
  border-top-color:var(--deep-purple);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{margin-top:.5rem;font-size:.82rem;color:#999;font-style:italic}
.fallback-note{
  text-align:center;font-size:.78rem;color:#b08a00;
  background:#fef9e7;padding:.45rem .8rem;border-radius:6px;
  max-width:480px;margin:0 auto 1rem;
}

/* ════════════════════════════════
   HERO
   ════════════════════════════════ */
.hero{
  background:linear-gradient(160deg,#f8f0ff 0%,#eedcf7 30%,#e4cbf0 60%,#dbbee9 100%);
  text-align:center;
  padding:1.4rem 1.5rem 0;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,.5) 0%,transparent 65%);
  pointer-events:none;
}
/* Corner bouquets — hidden, image has bad transparency */
.hero-corner{display:none}

.hero h1{
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:clamp(1.6rem,4.5vw,2.4rem);
  color:var(--deep-purple);letter-spacing:.02em;
  position:relative;z-index:1;
}
.hero .ampersand{
  font-style:italic;font-weight:400;
  display:inline-block;margin:0 .12em;opacity:.75;
}
.hero .subtitle{
  font-family:'Lato',sans-serif;
  font-size:clamp(.78rem,2vw,.95rem);
  color:#5a3d7a;margin-top:.2rem;
  font-weight:300;letter-spacing:.08em;
  text-transform:uppercase;position:relative;z-index:1;
}
.hero-bouquet{
  display:block;margin:.5rem auto .3rem;
  width:clamp(120px,25vw,180px);height:auto;
  position:relative;z-index:1;opacity:.8;
}
.hero-border{
  display:block;width:100%;margin-top:.2rem;
  position:relative;z-index:1;margin-bottom:-2px;
}
.hero-border img{
  display:block;width:100%;
  height:clamp(30px,5vw,50px);
  object-fit:cover;object-position:top center;
}

/* ════════════════════════════════
   TIMELINE
   ════════════════════════════════ */
.timeline-wrap{
  max-width:700px;margin:0 auto;
  padding:2rem 1.5rem 3rem;
}
.date-group{margin-bottom:2rem}
.date-group-header{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;font-weight:600;
  color:var(--deep-purple);text-align:center;
  margin-bottom:1.1rem;
  display:flex;align-items:center;gap:.6rem;
}
.date-group-header::before,
.date-group-header::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--lavender),transparent);
}
.date-group-header span{padding:0 .2rem;white-space:nowrap}

.timeline{position:relative;padding-left:34px}
.timeline::before{
  content:'';position:absolute;left:11px;top:0;bottom:0;
  width:2px;
  background:linear-gradient(180deg,var(--lavender),var(--deep-purple),var(--lavender));
  border-radius:1px;
}

.tl-item{position:relative;margin-bottom:.9rem;cursor:pointer}
.tl-item:last-child{margin-bottom:0}

/* Clean purple circle dots — centered on line */
.tl-dot{
  position:absolute;left:-28px;top:14px;
  width:12px;height:12px;
  background:var(--lavender);
  border:2.5px solid var(--deep-purple);
  border-radius:50%;z-index:2;
  transition:transform .25s,box-shadow .25s,background .25s;
}
.tl-item:hover .tl-dot,
.tl-item.active .tl-dot{
  transform:scale(1.35);background:var(--deep-purple);
  box-shadow:0 0 0 4px rgba(180,151,214,.4);
}

/* Completed / past events */
.tl-item.completed .tl-dot{background:#c8b8d8;border-color:#a090b0}
.tl-item.completed .tl-header{opacity:.5}
.tl-item.completed .tl-title{
  text-decoration:line-through;
  text-decoration-color:var(--lavender);color:#999;
}
.tl-item.completed .tl-time{color:#b0a0c0}
.tl-item.completed:hover .tl-header{opacity:.7}

.tl-header{
  background:#fff;border-radius:10px;
  padding:.8rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--card-shadow);
  transition:box-shadow .25s,transform .2s,border-color .2s;
  border:1px solid transparent;
}
.tl-item:hover .tl-header{
  box-shadow:0 4px 18px rgba(106,61,154,.18);
  transform:translateY(-1px);border-color:var(--light-lavender);
}
.tl-item.active .tl-header{
  border-color:var(--lavender);
  border-bottom-left-radius:0;border-bottom-right-radius:0;
}
.tl-title{
  font-family:'Playfair Display',serif;
  font-weight:600;font-size:1rem;color:var(--charcoal);
}
.tl-time{
  font-size:.82rem;color:var(--deep-purple);
  font-weight:600;white-space:nowrap;margin-left:.6rem;
}

.tl-detail{
  max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;
  opacity:0;
}
.tl-item.active .tl-detail{opacity:1}
.tl-detail-inner{
  background:#fff;
  border:1px solid var(--light-lavender);border-top:none;
  border-radius:0 0 10px 10px;
  padding:.9rem 1.1rem;
  border-left:3px solid var(--lavender);
  box-shadow:0 4px 12px rgba(106,61,154,.08);
  position:relative;overflow:hidden;
}
.tl-detail-inner::after{
  content:'';position:absolute;right:6px;bottom:4px;
  width:35px;height:60px;
  background:url('images/watercolor-lavender-pressed-dried-flowers-illustration-png.webp') no-repeat center center;
  background-size:contain;opacity:.12;pointer-events:none;
}
.tl-detail-inner p{
  margin-bottom:.45rem;font-size:.9rem;line-height:1.5;
  position:relative;z-index:1;
}
.tl-detail-inner p:last-child{margin-bottom:0}
.tl-detail-inner .label{font-weight:600;color:var(--deep-purple);margin-right:.2rem}
.tl-detail-inner a{
  color:var(--deep-purple);text-decoration:underline;
  text-underline-offset:2px;transition:color .2s;
}
.tl-detail-inner a:hover{color:#8b5fc7}

/* ─── Guest list inside event detail ─── */
.guest-list{margin-top:.6rem;padding-top:.5rem;border-top:1px dashed var(--light-lavender)}
.guest-list-title{font-size:.78rem;font-weight:600;color:var(--deep-purple);margin-bottom:.3rem}
.guest-chips{display:flex;flex-wrap:wrap;gap:.3rem}
.guest-chip{
  font-size:.72rem;font-weight:500;padding:.18rem .5rem;
  border-radius:12px;background:var(--light-lavender);color:var(--deep-purple);
  white-space:nowrap;
}
.guest-chip.departed{opacity:.45;text-decoration:line-through}

/* ════════════════════════════════
   CONTACT BAR
   ════════════════════════════════ */
.contact-bar{
  text-align:center;padding:1.2rem 1rem;
  max-width:700px;margin:0 auto;
}
.contact-bar p{font-size:.88rem;color:#777;margin-bottom:.5rem}
.btn-text-us{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:'Lato',sans-serif;font-size:.9rem;font-weight:600;
  color:#fff;background:var(--deep-purple);
  border:none;border-radius:28px;padding:.6rem 1.5rem;
  text-decoration:none;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 2px 10px rgba(106,61,154,.25);
}
.btn-text-us:hover{background:#7d4db8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(106,61,154,.35)}
.btn-text-us:active{transform:scale(.97)}

/* ════════════════════════════════
   FOOTER
   ════════════════════════════════ */
.footer-floral{width:100%;overflow:hidden;margin-top:.5rem}
.footer-floral img{
  display:block;width:100%;
  height:clamp(40px,8vw,75px);
  object-fit:cover;object-position:bottom center;
  opacity:.4;transform:rotate(180deg);
}
.footer-sprig{display:block;margin:0 auto;width:35px;height:auto;opacity:.4}
.footer{text-align:center;padding:.6rem 1rem 1.5rem;font-size:.75rem;color:#aaa}

/* ════════════════════════════════
   ADMIN PANEL
   ════════════════════════════════ */
.admin-panel{background:#f0edf3;border-bottom:3px solid var(--lavender);padding:1.5rem}
.admin-inner{max-width:820px;margin:0 auto}
.admin-panel h2{
  font-family:'Playfair Display',serif;
  font-size:1.35rem;color:var(--deep-purple);margin-bottom:.2rem;
}
.admin-panel .admin-sub{font-size:.85rem;color:#666;margin-bottom:1.2rem}
.admin-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}

/* Buttons */
.btn{
  font-family:'Lato',sans-serif;font-size:.82rem;font-weight:600;
  border:none;border-radius:6px;padding:.5rem 1rem;cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--deep-purple);color:#fff}
.btn-primary:hover{background:#7d4db8;box-shadow:0 2px 8px rgba(106,61,154,.3)}
.btn-secondary{background:#fff;color:var(--deep-purple);border:1.5px solid var(--lavender)}
.btn-secondary:hover{background:var(--light-lavender)}
.btn-danger{background:#d94f4f;color:#fff}
.btn-danger:hover{background:#c43c3c}
.btn-sm{padding:.35rem .7rem;font-size:.78rem}

/* ─── Section titles ─── */
.admin-section-title{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;color:var(--deep-purple);
  margin:1.2rem 0 .6rem;
  padding-bottom:.3rem;border-bottom:1px solid var(--light-lavender);
}

/* ─── Admin guest section ─── */
.admin-guests{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.admin-guest-card{
  background:#fff;border-radius:8px;padding:.7rem .9rem;
  box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid #e8e4ec;
  display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;flex-wrap:wrap;
}
.ag-info{flex:1;min-width:0}
.ag-name{font-weight:600;font-size:.9rem;color:var(--charcoal)}
.ag-meta{font-size:.75rem;color:#999;margin-top:.1rem}
.ag-link{
  font-size:.72rem;color:var(--deep-purple);
  word-break:break-all;display:block;margin-top:.15rem;
}
.ag-veg{
  display:inline-flex;align-items:center;gap:.2rem;
  font-size:.7rem;font-weight:600;color:#4a9a5b;margin-left:.4rem;
}
.ag-veg svg{flex-shrink:0}
.ag-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.25rem}
.ag-tag{
  font-size:.65rem;font-weight:600;padding:.12rem .4rem;
  border-radius:10px;background:#e8e4f0;color:#6A3D9A;
}
.ag-actions{display:flex;gap:.3rem;flex-shrink:0}

/* ─── Groups section ─── */
.groups-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem}
.group-chip{
  display:inline-flex;align-items:center;gap:.3rem;
  font-size:.8rem;font-weight:600;padding:.3rem .7rem;
  border-radius:16px;background:#fff;color:var(--deep-purple);
  border:1.5px solid var(--lavender);
}
.group-chip .group-delete{
  cursor:pointer;font-size:.7rem;color:#c44;opacity:.6;
  transition:opacity .15s;line-height:1;
}
.group-chip .group-delete:hover{opacity:1}
.add-group-row{
  display:flex;gap:.4rem;align-items:center;margin-top:.4rem;
}
.add-group-row input{
  flex:1;padding:.4rem .6rem;border:1.5px solid #ddd;border-radius:6px;
  font-family:'Lato',sans-serif;font-size:.82rem;
}
.add-group-row input:focus{outline:none;border-color:var(--lavender)}

/* ─── Bulk group buttons in forms ─── */
.bulk-group-bar{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem}
.bulk-group-btn{
  font-size:.72rem;font-weight:600;padding:.2rem .55rem;
  border-radius:12px;border:1.5px solid var(--lavender);
  background:#fff;color:var(--deep-purple);cursor:pointer;
  transition:background .15s;
}
.bulk-group-btn:hover{background:var(--light-lavender)}

/* ─── Reservation cards ─── */
.admin-reservations{display:flex;flex-direction:column;gap:.6rem}
.admin-res-card{
  background:#fff;border-radius:8px;padding:.9rem 1rem;
  box-shadow:0 1px 5px rgba(0,0,0,.05);border:1px solid #e8e4ec;
}
.ar-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem;flex-wrap:wrap}
.ar-name{font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;color:var(--charcoal)}
.ar-meta{font-size:.8rem;color:#777;margin-top:.2rem;line-height:1.45}
.ar-actions{display:flex;gap:.35rem;flex-shrink:0}
.ar-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.35rem}
.ar-tag{
  font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:10px;
  background:var(--light-lavender);color:var(--deep-purple);
}
.ar-veg-count{
  font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:10px;
  background:#e0f0e4;color:#3d7a4a;
}

/* ─── Event cards ─── */
.admin-events{display:flex;flex-direction:column;gap:.6rem}
.admin-event-card{
  background:#fff;border-radius:8px;padding:.9rem 1rem;
  box-shadow:0 1px 5px rgba(0,0,0,.05);border:1px solid #e8e4ec;
}
.ae-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem;flex-wrap:wrap}
.ae-name{font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;color:var(--charcoal)}
.ae-meta{font-size:.8rem;color:#777;margin-top:.2rem;line-height:1.45}
.ae-actions{display:flex;gap:.35rem;flex-shrink:0}
/* Guest tags on event cards */
.ae-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.35rem}
.ae-tag{
  font-size:.68rem;font-weight:600;
  padding:.15rem .5rem;border-radius:10px;
  background:var(--light-lavender);color:var(--deep-purple);
}

/* Toast */
.toast{
  position:fixed;top:16px;right:16px;
  padding:.55rem 1.1rem;border-radius:8px;
  font-family:'Lato',sans-serif;font-size:.82rem;font-weight:600;
  color:#fff;z-index:2000;
  opacity:0;transform:translateY(-10px);
  transition:opacity .3s,transform .3s;pointer-events:none;
}
.toast.visible{opacity:1;transform:translateY(0)}
.toast.saving{background:#7d4db8}
.toast.success{background:#4a9a5b}
.toast.error{background:#d94f4f}

/* Admin form modal */
.admin-form-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:1000;align-items:center;justify-content:center;padding:1rem;
}
.admin-form-overlay.visible{display:flex}
.admin-form{
  background:#fff;border-radius:12px;padding:1.6rem;
  width:100%;max-width:500px;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  max-height:90vh;overflow-y:auto;
}
.admin-form h3{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;color:var(--deep-purple);margin-bottom:.9rem;
}
.admin-form .field{margin-bottom:.8rem}
.admin-form label{display:block;font-size:.78rem;font-weight:600;color:#555;margin-bottom:.2rem}
.admin-form input,
.admin-form textarea{
  width:100%;padding:.5rem .7rem;border:1.5px solid #ddd;border-radius:6px;
  font-family:'Lato',sans-serif;font-size:.88rem;transition:border-color .2s;
}
.admin-form input:focus,
.admin-form textarea:focus{outline:none;border-color:var(--lavender);box-shadow:0 0 0 3px rgba(180,151,214,.2)}
.admin-form textarea{resize:vertical;min-height:55px}
.admin-form .form-actions{display:flex;gap:.5rem;margin-top:1rem;justify-content:flex-end}
/* Guest checkboxes in event form */
.guest-checks{display:flex;flex-wrap:wrap;gap:.5rem .8rem;margin-top:.3rem}
.guest-checks label{
  display:flex;align-items:center;gap:.3rem;
  font-size:.82rem;font-weight:400;color:var(--charcoal);cursor:pointer;
}
.guest-checks input[type="checkbox"]{
  accent-color:var(--deep-purple);width:15px;height:15px;cursor:pointer;
}
.guest-checks .no-guests-msg{font-size:.82rem;color:#999;font-style:italic}

.preview-label{
  text-align:center;font-family:'Playfair Display',serif;
  font-size:1rem;color:var(--deep-purple);
  margin:2rem auto 0;padding:.8rem 1rem 0;max-width:700px;
  border-top:1px solid var(--lavender);
}
.preview-label span{font-weight:300;font-size:.82rem;color:#888;display:block;margin-top:.1rem}

/* ════════════════════════════════
   RESPONSIVE
   ════════════════════════════════ */
@media(max-width:500px){
  .hero{padding:1rem .8rem 0}
  .hero h1{font-size:1.4rem}
  .hero-bouquet{width:100px}
  .hero-border img{height:22px}
  .timeline-wrap{padding:1.2rem .8rem 2.5rem}
  .timeline{padding-left:28px}
  .timeline::before{left:8px}
  .tl-dot{left:-24px;width:10px;height:10px}
  .tl-header{padding:.65rem .8rem}
  .tl-title{font-size:.9rem}
  .tl-time{font-size:.75rem}
  .tl-detail-inner{padding:.75rem .9rem}
  .tl-detail-inner::after{width:25px;height:42px;opacity:.08}
  .date-group-header{font-size:1rem}
  .admin-form{padding:1.2rem}
  .admin-guest-card{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div id="adminRoot"></div>

<header class="hero">
  <img class="hero-corner hero-corner-left"
       src="images/lavendar watercolor bouquet.webp" alt="" aria-hidden="true">
  <img class="hero-corner hero-corner-right"
       src="images/lavendar watercolor bouquet.webp" alt="" aria-hidden="true">
  <h1>Pari <span class="ampersand">&amp;</span> Marshall</h1>
  <p class="subtitle">Celebration Weekend &mdash; March 12&ndash;14, 2026</p>
  <img class="hero-bouquet"
       src="images/elegant-watercolor-illustration-of-lavender-flowers-blooming-with-detailed-foliage-on-dark-png.webp"
       alt="Lavender bouquet divider">
  <div class="hero-border">
    <img src="images/purple-lavender-flowers-border-design-element-png.webp" alt="">
  </div>
</header>

<main class="timeline-wrap" id="timelineWrap">
  <div class="loader" id="loader"><div class="spin"></div><p>Loading events&hellip;</p></div>
</main>

<div class="contact-bar">
  <p>Questions about any of the events?</p>
  <a class="btn-text-us" href="sms:9857732964">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Text Us
  </a>
</div>

<div class="footer-floral">
  <img src="images/seamless-floral-background-isolated-on-a-white-background-illustration-horizontally-repeatable-free-vector.webp" alt="">
</div>
<img class="footer-sprig" src="images/watercolor-lavender-pressed-dried-flowers-illustration-png.webp" alt="" aria-hidden="true">
<footer class="footer">&copy; 2026 Pari &amp; Marshall</footer>

<div class="toast" id="toast"></div>

<!-- Event form modal -->
<div class="admin-form-overlay" id="formOverlay">
  <div class="admin-form">
    <h3 id="formTitle">Add Event</h3>
    <div class="field">
      <label for="fName">Event Name</label>
      <input id="fName" type="text" placeholder="e.g. Engagement Party">
    </div>
    <div class="field">
      <label for="fDate">Date (MM/DD/YYYY)</label>
      <input id="fDate" type="text" placeholder="03/14/2026">
    </div>
    <div class="field">
      <label for="fTime">Time</label>
      <input id="fTime" type="text" placeholder="7:00 PM">
    </div>
    <div class="field">
      <label for="fLocation">Location Name</label>
      <input id="fLocation" type="text" placeholder="e.g. Four Winds Apartments">
    </div>
    <div class="field">
      <label for="fAddress">Address (for Google Maps)</label>
      <input id="fAddress" type="text" placeholder="210 Baronne St, New Orleans, LA 70112">
    </div>
    <div class="field">
      <label for="fTransport">Transportation / Parking Note</label>
      <textarea id="fTransport" placeholder="Parking info, rideshare tips, etc."></textarea>
    </div>
    <div class="field">
      <label>Guest List</label>

<script>
/* ══════════════════════════════════════════════════════════════
   JSONBIN CONFIG
   ══════════════════════════════════════════════════════════════ */
const JSONBIN_BIN_ID = "69a79396d0ea881f40ec7b82";
const JSONBIN_API_KEY = "$2a$10$VXKTGAUozJ29WIpXuKfZVOK.5l4qu3oMlgJa9pgPgzU3SpFM4kGh2";
const JSONBIN_API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

/* ══════════════════════════════════════════════════════════════
   DEFAULT DATA (fallback)
   ══════════════════════════════════════════════════════════════ */
const DEFAULT_EVENTS = [
  { id:"evt1", name:"Pari's Dissertation Defense", date:"03/12/2026", time:"11:00 AM", location:"Hutchinson Memorial Building", address:"Hutchinson Memorial Building, New Orleans, LA", transportNote:"Street parking and garage available near Hutchinson Memorial Building.", guestList:[] },
  { id:"evt2", name:"Dissertation Lunch", date:"03/12/2026", time:"12:00 PM", location:"Olive", address:"Olive Restaurant, New Orleans, LA", transportNote:"Walking distance from the defense venue. Street parking available.", guestList:[] },
  { id:"evt3", name:"Dissertation Dinner", date:"03/12/2026", time:"4:00 PM", location:"Saba", address:"Saba Restaurant, New Orleans, LA", transportNote:"Street parking and valet available at Saba.", guestList:[] },
  { id:"evt4", name:"Marriage Ceremony", date:"03/13/2026", time:"10:30 AM", location:"Four Winds Apartments - New Orleans", address:"210 Baronne St, New Orleans, LA 70112", transportNote:"Parking available at Four Winds Apartments complex.", guestList:[] },
  { id:"evt5", name:"Marriage Ceremony Brunch", date:"03/13/2026", time:"11:30 AM", location:"Thaihey NOLA", address:"Thaihey NOLA, New Orleans, LA", transportNote:"Short drive from Four Winds. Street parking available near Thaihey NOLA.", guestList:[] },
  { id:"evt6", name:"St Patty's Day Parade", date:"03/14/2026", time:"1:00 PM", location:"Hot Tin", address:"The Pontchartrain Hotel, New Orleans, LA", transportNote:"Rideshare recommended — parade route may affect street access. Hot Tin is at The Pontchartrain Hotel.", guestList:[] },
  { id:"evt7", name:"Engagement Party Setup", date:"03/14/2026", time:"4:00 PM", location:"Four Winds Apartments - New Orleans", address:"210 Baronne St, New Orleans, LA 70112", transportNote:"Parking available at Four Winds Apartments complex. Helpers only.", guestList:[] },
  { id:"evt8", name:"Engagement Party Starts", date:"03/14/2026", time:"7:00 PM", location:"Four Winds Apartments - New Orleans", address:"210 Baronne St, New Orleans, LA 70112", transportNote:"Parking available at Four Winds Apartments complex. Rideshare also recommended — 210 Baronne St, New Orleans, LA 70112.", guestList:[] },
  { id:"evt9", name:"Engagement Party Ends", date:"03/14/2026", time:"10:30 PM", location:"Four Winds Apartments - New Orleans", address:"210 Baronne St, New Orleans, LA 70112", transportNote:"Rideshare recommended for departure.", guestList:[] }
];

/* ══════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════ */
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get('admin') === 'true';
const guestCode = params.get('guest'); /* null = show all events */
let events = [];
let guests = [];
let reservations = [];
let groups = []; /* Array of strings, e.g. ["Family", "Friends"] */
let editingId = null;
let editingGuestId = null;
let editingResId = null;
let activeEventId = null;
let usingFallback = false;

/* ══════════════════════════════════════════════════════════════
   JSONBIN
   ══════════════════════════════════════════════════════════════ */
async function fetchEvents() {
  try {
    const res = await fetch(`${JSONBIN_API_URL}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    if (!res.ok) throw new Error('Fetch failed');
    const data = await res.json();
    const record = data.record;

    /* Migration: old format was a plain array or had views */
    if (Array.isArray(record)) {
      events = record.map(e => ({ ...e, guestList: e.guestList || [] }));
      guests = [];
      reservations = [];
      groups = [];
      if (isAdmin) await saveToJsonBin(true);
    } else {
      events = (record.events || []).map(e => ({ ...e, guestList: e.guestList || [] }));
      guests = (record.guests || []).map(g => ({ ...g, code: g.code || randomCode(), vegetarian: g.vegetarian || false, group: g.group || '' }));
      reservations = record.reservations || [];
      groups = record.groups || [];
    }
    /* Strip legacy views field from events */
    events.forEach(e => { delete e.views; });
    usingFallback = false;
  } catch (e) {
    console.warn('JSONBin fetch failed, using defaults:', e);
    events = JSON.parse(JSON.stringify(DEFAULT_EVENTS));
    guests = [];
    reservations = [];
    groups = [];
    usingFallback = true;
  }
}

async function saveToJsonBin(silent) {
  if (!silent) showToast('Saving...', 'saving');
  try {
    const res = await fetch(JSONBIN_API_URL, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'X-Master-Key': JSONBIN_API_KEY },
      body: JSON.stringify({ events, guests, reservations, groups })
    });
    if (!res.ok) throw new Error('Save failed');
    if (!silent) showToast('Saved \u2713', 'success', 2000);
  } catch (e) {
    console.error('Save error:', e);
    if (!silent) showToast('Error saving \u2014 try again', 'error', 3000);
  }
}

/* ══════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, type, autoHide) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible ' + type;
  clearTimeout(toastTimer);
  if (autoHide) toastTimer = setTimeout(() => t.classList.remove('visible'), autoHide);
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════════ */
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function parseDate(s){ const [m,d,y]=s.split('/').map(Number); return new Date(y,m-1,d); }
function parseTime(t){
  const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i); if(!m) return 0;
  let h=parseInt(m[1],10); const min=parseInt(m[2],10); const ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0; return h*60+min;
}
function formatDateHeading(ds){
  const d=parseDate(ds);
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[d.getDay()]+', '+mos[d.getMonth()]+' '+d.getDate();
}
function sortEvents(a){ return a.sort((x,y)=>{ const dx=parseDate(x.date),dy=parseDate(y.date); return dx-dy||parseTime(x.time)-parseTime(y.time); }); }
function isEventPast(ev){ const d=parseDate(ev.date); const m=parseTime(ev.time); d.setHours(Math.floor(m/60),m%60,0,0); return new Date()>d; }
function mapsUrl(a){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a); }
function nextId(){ return 'evt'+(Math.max(0,...events.map(e=>{const m=e.id.match(/\d+/);return m?+m[0]:0}))+1); }
function nextGuestId(){ return 'g'+(Math.max(0,...guests.map(g=>{const m=g.id.match(/\d+/);return m?+m[0]:0}))+1); }
function randomCode(){ const c='abcdefghijklmnopqrstuvwxyz0123456789'; let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function guestShareUrl(code){
  const base = window.location.origin + window.location.pathname;
  return base + '?guest=' + encodeURIComponent(code);
}
function findGuestByCode(code){ return guests.find(g => g.code === code); }

/* ══════════════════════════════════════════════════════════════
   RENDER GUEST TIMELINE
   ══════════════════════════════════════════════════════════════ */
function getFilteredEvents() {
  let list = [...events];
  if (guestCode && !isAdmin) {
    const g = findGuestByCode(guestCode);
    if (g) {
      list = list.filter(ev => (ev.guestList || []).includes(g.id));
    } else {
      list = []; /* unknown guest code — show nothing */
    }
  }
  return sortEvents(list);
}

/* Get guests on an event's guest list who are in town on that date */
function guestsForEvent(ev) {
  const evDate = parseDate(ev.date);
  return (ev.guestList || []).map(gid => guests.find(g => g.id === gid)).filter(g => {
    if (!g) return false;
    const arr = parseDate(g.arrival);
    const dep = parseDate(g.departure);
    return evDate >= arr && evDate <= dep;
  });
}

function renderTimeline() {
  const wrap = document.getElementById('timelineWrap');
  const sorted = getFilteredEvents();

  const groups = {};
  sorted.forEach(ev => { if(!groups[ev.date]) groups[ev.date]=[]; groups[ev.date].push(ev); });

  let html = '';
  if (usingFallback) html += '<div class="fallback-note">Showing cached events. Refresh to check for updates.</div>';

  Object.keys(groups).forEach(date => {
    html += '<div class="date-group">';
    html += '<div class="date-group-header"><span>'+formatDateHeading(date)+'</span></div>';
    html += '<div class="timeline">';
    groups[date].forEach(ev => {
      const active = activeEventId===ev.id;
      const past = isEventPast(ev);
      let cls='tl-item'; if(past) cls+=' completed'; if(active) cls+=' active';
      html += '<div class="'+cls+'" onclick="toggleEvent(\''+ev.id+'\')">';
      html += '<div class="tl-dot"></div>';
      html += '<div class="tl-header">';
      html += '<span class="tl-title">'+esc(ev.name)+'</span>';
      html += '<span class="tl-time">'+esc(ev.time)+'</span>';
      html += '</div>';
      html += '<div class="tl-detail" id="detail-'+ev.id+'">';
      html += '<div class="tl-detail-inner">';
      html += '<p><span class="label">Location:</span> <a href="'+mapsUrl(ev.address)+'" target="_blank" rel="noopener">'+esc(ev.location)+'</a></p>';
      html += '<p><span class="label">Getting There:</span> '+esc(ev.transportNote)+'</p>';
      /* Guest list for this event */
      const evGuests = guestsForEvent(ev);
      if (evGuests.length) {
        const evDate = parseDate(ev.date);
        html += '<div class="guest-list">';
        html += '<div class="guest-list-title">Who\u2019s in Town ('+evGuests.length+')</div>';
        html += '<div class="guest-chips">';
        evGuests.forEach(g => {
          const dep = parseDate(g.departure);
          const isDepartDay = dep.getTime() === evDate.getTime();
          html += '<span class="guest-chip'+(isDepartDay?' departed':'')+'">'+esc(g.name)+(isDepartDay?' (departing)':'')+'</span>';
        });
        html += '</div></div>';
      }
      html += '</div></div></div>';
    });
    html += '</div></div>';
  });

  if (sorted.length === 0) html = '<p style="text-align:center;color:#999;padding:2rem">No events to show.</p>';
  wrap.innerHTML = html;

  if (activeEventId) {
    requestAnimationFrame(() => {
      const det = document.getElementById('detail-'+activeEventId);
      if (det) det.style.maxHeight = det.scrollHeight+'px';
    });
  }
}

function toggleEvent(id){ activeEventId = (activeEventId===id)?null:id; renderTimeline(); }

/* ══════════════════════════════════════════════════════════════
   RENDER ADMIN PANEL
   ══════════════════════════════════════════════════════════════ */
function renderAdmin() {
  if (!isAdmin) return;
  const root = document.getElementById('adminRoot');
  const sorted = sortEvents([...events]);

  let h = '<div class="admin-panel"><div class="admin-inner">';
  h += '<h2>Admin Panel</h2>';
  h += '<p class="admin-sub">Manage guests and events. Each guest gets a unique link showing only their events.</p>';

  /* ─── Groups section ─── */
  h += '<div class="admin-section-title">Guest Groups</div>';
  h += '<div class="groups-grid">';
  groups.forEach((grp, i) => {
    const count = guests.filter(g => g.group === grp).length;
    h += '<span class="group-chip">'+esc(grp)+' <span style="font-weight:400;color:#999;font-size:.7rem">('+count+')</span> <span class="group-delete" onclick="deleteGroup('+i+')">&times;</span></span>';
  });
  if (groups.length===0) h += '<span style="font-size:.82rem;color:#999;font-style:italic">No groups defined yet.</span>';

  h += '<div class="add-group-row">';

  h += '</div>';

  /* ─── Guests section ─── */
  h += '<div class="admin-section-title" style="margin-top:1.5rem">Guests</div>';

  h += '<button class="btn btn-primary btn-sm" onclick="openAddGuestForm()">&#xFF0B; Add Guest</button>';
  h += '</div>';
  h += '<div class="admin-guests">';
  const sortedGuests = [...guests].sort((a,b) => {
    /* Sort by group first, then name */
    const ga = a.group || '\uffff', gb = b.group || '\uffff';
    return ga.localeCompare(gb) || a.name.localeCompare(b.name);
  });
  sortedGuests.forEach(g => {
    const evCount = events.filter(e => (e.guestList||[]).includes(g.id)).length;

    h += '</div>';
    if (g.group) h += '<div class="ag-tags"><span class="ag-tag">'+esc(g.group)+'</span></div>';
    h += '<div class="ag-meta">Arrives: '+esc(g.arrival)+' &mdash; Departs: '+esc(g.departure)+' &middot; '+evCount+' event'+(evCount!==1?'s':'')+'</div>';
    h += '<div class="ag-link">'+esc(guestShareUrl(g.code))+'</div>';
    h += '</div>';
    h += '<div class="ag-actions">';
    h += '<button class="btn btn-secondary btn-sm" onclick="copyGuestLink(\''+esc(g.code)+'\')">Copy Link</button>';
    h += '<button class="btn btn-secondary btn-sm" onclick="openEditGuestForm(\''+g.id+'\')">Edit</button>';
    h += '<button class="btn btn-danger btn-sm" onclick="deleteGuest(\''+g.id+'\')">Delete</button>';
    h += '</div></div>';
  });
  if (guests.length===0) h += '<p style="color:#999;text-align:center;padding:.6rem;font-size:.85rem">No guests added yet. Add guests first, then assign them to events.</p>';
  h += '</div>';

  /* ─── Reservations section ─── */
  h += '<div class="admin-section-title" style="margin-top:1.5rem">Restaurant Reservations</div>';

    const da = parseDate(a.date), db = parseDate(b.date);

  sortedRes.forEach(r => {

    if ((r.guestIds||[]).length) {

    }
    h += '</div><div class="ar-actions">';

  if (reservations.length===0) h += '<p style="color:#999;text-align:center;padding:.6rem;font-size:.85rem">No reservations yet.</p>';
  h += '</div>';

  /* ─── Events section ─── */
  h += '<div class="admin-section-title" style="margin-top:1.5rem">Events</div>';
  h += '<div class="admin-bar">';

  h += '<button class="btn btn-danger" onclick="resetData()">&#x21BA; Reset to Default</button>';
  h += '</div>';
  h += '<div class="admin-events">';
  sorted.forEach(ev => {
    h += '<div class="admin-event-card"><div class="ae-top"><div>';

    h += '</div></div></div>';
  });
  if (sorted.length===0) h += '<p style="color:#999;text-align:center;padding:1rem">No events.</p>';
  h += '</div></div></div>';
  h += '<div class="preview-label">Preview <span>What guests will see (showing all events)</span></div>';
  root.innerHTML = h;
}

function openAddGuestForm() {

  document.getElementById('gArrival').value = '';
  document.getElementById('gDeparture').value = '';
  document.getElementById('gVegetarian').checked = false;
  populateGroupDropdown('');
  document.getElementById('guestFormOverlay').classList.add('visible');
}

function openEditGuestForm(id) {
  const g = guests.find(x => x.id===id);
  if (!g) return;
  editingGuestId = id;
  document.getElementById('guestFormTitle').textContent = 'Edit Guest';
  document.getElementById('gName').value = g.name;
  document.getElementById('gArrival').value = g.arrival;
  document.getElementById('gDeparture').value = g.departure;
  document.getElementById('gVegetarian').checked = !!g.vegetarian;
  populateGroupDropdown(g.group || '');
  document.getElementById('guestFormOverlay').classList.add('visible');
}

function closeGuestForm() {
  document.getElementById('guestFormOverlay').classList.remove('visible');
  editingGuestId = null;
}

function saveGuestForm() {
  const name = document.getElementById('gName').value.trim();
  const arrival = document.getElementById('gArrival').value.trim();
  const departure = document.getElementById('gDeparture').value.trim();
  const vegetarian = document.getElementById('gVegetarian').checked;
  const group = document.getElementById('gGroup').value;
  if (!name||!arrival||!departure) { alert('Please fill in name, arrival date, and departure date.'); return; }
  if (editingGuestId) {
    const g = guests.find(x => x.id===editingGuestId);
    if (g) { g.name=name; g.arrival=arrival; g.departure=departure; g.vegetarian=vegetarian; g.group=group; }
  } else {
    let code = randomCode();
    while (guests.some(g => g.code === code)) code = randomCode();
    guests.push({ id:nextGuestId(), name, arrival, departure, vegetarian, code, group });
  }
  closeGuestForm();
  renderAll();
  saveToJsonBin();
}

function deleteGuest(id) {
  const g = guests.find(x => x.id===id);
  if (!g) return;
  if (!confirm('Delete guest "'+g.name+'"? They will be removed from all event guest lists.')) return;
  guests = guests.filter(x => x.id!==id);
  /* Remove from all event guest lists and reservations */
  events.forEach(ev => { if(ev.guestList) ev.guestList = ev.guestList.filter(gid => gid !== id); });
  reservations.forEach(r => { if(r.guestIds) r.guestIds = r.guestIds.filter(gid => gid !== id); });
  renderAll();
  saveToJsonBin();
}

function copyGuestLink(code) {
  const url = guestShareUrl(code);
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied!', 'success', 1500);
  }).catch(() => {
    prompt('Copy this link:', url);
  });
}

/* ══════════════════════════════════════════════════════════════
   GROUP MANAGEMENT
   ══════════════════════════════════════════════════════════════ */
function addGroup() {
  const inp = document.getElementById('newGroupName');
  const name = inp.value.trim();
  if (!name) return;
  if (groups.includes(name)) { alert('Group "'+name+'" already exists.'); return; }
  groups.push(name);
  inp.value = '';
  renderAll();
  saveToJsonBin();
}
function deleteGroup(i) {
  const name = groups[i];
  if (!confirm('Delete group "'+name+'"? Guests in this group will become ungrouped.')) return;
  groups.splice(i, 1);
  guests.forEach(g => { if (g.group === name) g.group = ''; });
  renderAll();
  saveToJsonBin();
}
function populateGroupDropdown(selectedGroup) {
  const sel = document.getElementById('gGroup');
  sel.innerHTML = '<option value="">— No group —</option>' +
    groups.map(g => '<option value="'+esc(g)+'"'+(g===selectedGroup?' selected':'')+'>'+esc(g)+'</option>').join('');
}
function toggleGroupChecks(containerId, groupName) {
  const boxes = document.querySelectorAll('#'+containerId+' input[type="checkbox"]');
  if (groupName === '__all__') {
    boxes.forEach(cb => cb.checked = true);
  } else if (groupName === '__none__') {
    boxes.forEach(cb => cb.checked = false);
  } else {
    const idsInGroup = guests.filter(g => g.group === groupName).map(g => g.id);
    boxes.forEach(cb => {
      if (idsInGroup.includes(cb.value)) cb.checked = !cb.checked;
    });
  }
}

/* ══════════════════════════════════════════════════════════════
   EVENT FORM
   ══════════════════════════════════════════════════════════════ */
function renderFormGuestChecks(selectedGuestIds) {
  const container = document.getElementById('formGuestChecks');
  if (guests.length === 0) {
    container.innerHTML = '<span class="no-guests-msg">Add guests first to assign them to events.</span>';
    return;
  }
  let html = '';
  if (groups.length > 0) {
    html += '<div class="bulk-group-bar">';
    html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'formGuestChecks\',\'__all__\')">All</button>';
    html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'formGuestChecks\',\'__none__\')">None</button>';
    groups.forEach(grp => {
      html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'formGuestChecks\',\''+esc(grp)+'\')">'+esc(grp)+'</button>';
    });
    html += '</div>';
  }
  const sorted = [...guests].sort((a,b) => a.name.localeCompare(b.name));
  html += sorted.map(g => {
    const checked = selectedGuestIds.includes(g.id) ? 'checked' : '';
    return '<label><input type="checkbox" value="'+esc(g.id)+'" '+checked+'> '+esc(g.name)+'</label>';
  }).join('');
  container.innerHTML = html;
}

function getCheckedGuests() {
  const boxes = document.querySelectorAll('#formGuestChecks input[type="checkbox"]');
  return Array.from(boxes).filter(cb => cb.checked).map(cb => cb.value);
}

function openAddForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'Add Event';
  document.getElementById('fName').value = '';
  document.getElementById('fDate').value = '';
  document.getElementById('fTime').value = '';
  document.getElementById('fLocation').value = '';
  document.getElementById('fAddress').value = '';
  document.getElementById('fTransport').value = '';
  renderFormGuestChecks(guests.map(g => g.id)); /* all guests checked by default */
  document.getElementById('formOverlay').classList.add('visible');
}

function openEditForm(id) {
  const ev = events.find(e => e.id===id);
  if (!ev) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Edit Event';
  document.getElementById('fName').value = ev.name;
  document.getElementById('fDate').value = ev.date;
  document.getElementById('fTime').value = ev.time;
  document.getElementById('fLocation').value = ev.location;
  document.getElementById('fAddress').value = ev.address;
  document.getElementById('fTransport').value = ev.transportNote;
  renderFormGuestChecks(ev.guestList || []);
  document.getElementById('formOverlay').classList.add('visible');
}

function closeForm() {
  document.getElementById('formOverlay').classList.remove('visible');
  editingId = null;
}

function saveForm() {
  const name = document.getElementById('fName').value.trim();
  const date = document.getElementById('fDate').value.trim();
  const time = document.getElementById('fTime').value.trim();
  const location = document.getElementById('fLocation').value.trim();
  const address = document.getElementById('fAddress').value.trim();
  const transportNote = document.getElementById('fTransport').value.trim();
  const guestList = getCheckedGuests();

  if (!name||!date||!time||!location) { alert('Please fill in name, date, time, and location.'); return; }

  if (editingId) {
    const ev = events.find(e => e.id===editingId);
    if (ev) { ev.name=name; ev.date=date; ev.time=time; ev.location=location; ev.address=address; ev.transportNote=transportNote; ev.guestList=guestList; }
  } else {
    events.push({ id:nextId(), name, date, time, location, address, transportNote, guestList });
  }

  closeForm();
  renderAll();
  saveToJsonBin();
}

function deleteEvent(id) {
  const ev = events.find(e => e.id===id);
  if (!ev) return;
  if (!confirm('Are you sure you want to delete "'+ev.name+'"?')) return;
  events = events.filter(e => e.id!==id);
  if (activeEventId===id) activeEventId=null;
  renderAll();
  saveToJsonBin();
}

function resetData() {
  if (!confirm('Reset all events to defaults? This will overwrite your current data and clear all guests and reservations.')) return;
  events = JSON.parse(JSON.stringify(DEFAULT_EVENTS));
  guests = [];
  reservations = [];
  groups = [];
  activeEventId = null;
  renderAll();
  saveToJsonBin();
}

/* ══════════════════════════════════════════════════════════════
   RESERVATION MANAGEMENT
   ══════════════════════════════════════════════════════════════ */
function nextResId(){ return 'res'+(Math.max(0,...reservations.map(r=>{const m=r.id.match(/\d+/);return m?+m[0]:0}))+1); }

function renderResGuestChecks(selectedIds) {
  const container = document.getElementById('resGuestChecks');
  if (guests.length === 0) {
    container.innerHTML = '<span class="no-guests-msg">Add guests first.</span>';
    return;
  }
  let html = '';
  if (groups.length > 0) {
    html += '<div class="bulk-group-bar">';
    html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'resGuestChecks\',\'__all__\')">All</button>';
    html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'resGuestChecks\',\'__none__\')">None</button>';
    groups.forEach(grp => {
      html += '<button type="button" class="bulk-group-btn" onclick="toggleGroupChecks(\'resGuestChecks\',\''+esc(grp)+'\')">'+esc(grp)+'</button>';
    });
    html += '</div>';
  }
  const sorted = [...guests].sort((a,b) => a.name.localeCompare(b.name));
  html += sorted.map(g => {
    const checked = selectedIds.includes(g.id) ? 'checked' : '';
    const veg = g.vegetarian ? ' (veg)' : '';
    return '<label><input type="checkbox" value="'+esc(g.id)+'" '+checked+'> '+esc(g.name)+veg+'</label>';
  }).join('');
  container.innerHTML = html;
}
function getResCheckedGuests() {
  const boxes = document.querySelectorAll('#resGuestChecks input[type="checkbox"]');
  return Array.from(boxes).filter(cb => cb.checked).map(cb => cb.value);
}

function openAddResForm() {
  editingResId = null;
  document.getElementById('resFormTitle').textContent = 'Add Reservation';
  document.getElementById('rRestaurant').value = '';
  document.getElementById('rDate').value = '';
  document.getElementById('rTime').value = '';
  document.getElementById('rPartySize').value = '';
  document.getElementById('rConfirmation').value = '';
  document.getElementById('rPhone').value = '';
  document.getElementById('rNotes').value = '';
  renderResGuestChecks([]);
  document.getElementById('resFormOverlay').classList.add('visible');
}

function openEditResForm(id) {
  const r = reservations.find(x => x.id===id);
  if (!r) return;
  editingResId = id;
  document.getElementById('resFormTitle').textContent = 'Edit Reservation';
  document.getElementById('rRestaurant').value = r.restaurant;
  document.getElementById('rDate').value = r.date;
  document.getElementById('rTime').value = r.time;
  document.getElementById('rPartySize').value = r.partySize || '';
  document.getElementById('rConfirmation').value = r.confirmation || '';
  document.getElementById('rPhone').value = r.contactPhone || '';
  document.getElementById('rNotes').value = r.notes || '';
  renderResGuestChecks(r.guestIds || []);
  document.getElementById('resFormOverlay').classList.add('visible');
}

function closeResForm() {
  document.getElementById('resFormOverlay').classList.remove('visible');
  editingResId = null;
}

function saveResForm() {
  const restaurant = document.getElementById('rRestaurant').value.trim();
  const date = document.getElementById('rDate').value.trim();
  const time = document.getElementById('rTime').value.trim();
  const partySize = parseInt(document.getElementById('rPartySize').value, 10) || 0;
  const confirmation = document.getElementById('rConfirmation').value.trim();
  const contactPhone = document.getElementById('rPhone').value.trim();
  const notes = document.getElementById('rNotes').value.trim();
  const guestIds = getResCheckedGuests();
  if (!restaurant||!date||!time) { alert('Please fill in restaurant, date, and time.'); return; }
  if (editingResId) {
    const r = reservations.find(x => x.id===editingResId);
    if (r) { r.restaurant=restaurant; r.date=date; r.time=time; r.partySize=partySize; r.confirmation=confirmation; r.contactPhone=contactPhone; r.notes=notes; r.guestIds=guestIds; }
  } else {
    reservations.push({ id:nextResId(), restaurant, date, time, partySize, confirmation, contactPhone, notes, guestIds });
  }
  closeResForm();
  renderAll();
  saveToJsonBin();
}

function deleteRes(id) {
  const r = reservations.find(x => x.id===id);
  if (!r) return;
  if (!confirm('Delete reservation at "'+r.restaurant+'"?')) return;
  reservations = reservations.filter(x => x.id!==id);
  renderAll();
  saveToJsonBin();
}

/* ══════════════════════════════════════════════════════════════
   CONSOLE HELPER: reservationSummary()
   ══════════════════════════════════════════════════════════════ */
window.reservationSummary = function() {
  if (reservations.length === 0) { console.log('No reservations.'); return; }
  const sorted = [...reservations].sort((a,b) => parseDate(a.date) - parseDate(b.date) || parseTime(a.time) - parseTime(b.time));
  console.log('%c Reservation Summary', 'font-size:14px;font-weight:bold;color:#6A3D9A');
  console.log('━'.repeat(50));
  const tableData = [];
  sorted.forEach(r => {
    const gNames = (r.guestIds||[]).map(gid => {
      const g = guests.find(x => x.id === gid);
      if (!g) return gid;
      return g.name + (g.vegetarian ? ' (veg)' : '');
    });
    const vegCount = (r.guestIds||[]).reduce((n,gid) => { const g=guests.find(x=>x.id===gid); return n+(g&&g.vegetarian?1:0); }, 0);
    console.log(
      `%c${r.restaurant}%c — ${r.date} ${r.time}`,
      'font-weight:bold;color:#6A3D9A', 'color:inherit'
    );
    console.log(`  Party: ${r.partySize||'?'} | Conf: ${r.confirmation||'N/A'} | Phone: ${r.contactPhone||'N/A'}`);
    if (gNames.length) console.log('  Guests: ' + gNames.join(', '));
    if (vegCount > 0) console.log('  Vegetarians: ' + vegCount);
    if (r.notes) console.log('  Notes: ' + r.notes);
    console.log('---');
    tableData.push({
      Restaurant: r.restaurant,
      Date: r.date,
      Time: r.time,
      'Party Size': r.partySize || '?',
      Vegetarians: vegCount,
      Confirmation: r.confirmation || 'N/A'
    });
  });
  console.table(tableData);
};

/* ══════════════════════════════════════════════════════════════
   RENDER ALL + INIT
   ══════════════════════════════════════════════════════════════ */
function renderAll() { renderAdmin(); renderTimeline(); }

document.getElementById('formOverlay').addEventListener('click', function(e){ if(e.target===this) closeForm(); });
document.getElementById('guestFormOverlay').addEventListener('click', function(e){ if(e.target===this) closeGuestForm(); });
document.getElementById('resFormOverlay').addEventListener('click', function(e){ if(e.target===this) closeResForm(); });

(async function init() {
  await fetchEvents();
  renderAll();
  setInterval(renderTimeline, 60000);
})();
</script>
